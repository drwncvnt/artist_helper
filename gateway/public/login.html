<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artist Helper - sign in</title>
<link rel="stylesheet" href="/shared/xp.css" />
<script defer src="https://stats.drwncvnt.com/script.js" data-website-id="e842424d-b5e8-4642-960e-46be6f5c2aa1"></script>
<style>
  body { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="dialog-overlay" style="position: static; background: none;">
  <div class="dialog window">
    <div class="titlebar">
      <div class="titlebar-icon"></div>
      <span class="titlebar-text" id="dlgTitle">Sign in - Artist Helper</span>
    </div>
    <div class="dialog-body">
      <p class="hint" style="margin-bottom: 10px;">An account is required to use Artist Helper (by drwncvnt).</p>

      <form id="loginForm" autocomplete="on">
        <p class="dialog-error" id="loginError"></p>
        <div class="field">
          <label class="field-label" for="loginUsername">Username</label>
          <input type="text" id="loginUsername" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label class="field-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" autocomplete="current-password" required />
        </div>
        <div class="dialog-actions">
          <button type="submit" class="btn primary">Sign in</button>
        </div>
      </form>
      <div class="dialog-switch" id="toRegisterWrap">No account? <a id="showRegister">Create one</a></div>

      <form id="registerForm" class="hidden" autocomplete="on">
        <p class="dialog-error" id="registerError"></p>
        <div class="field">
          <label class="field-label" for="regUsername">Username</label>
          <input type="text" id="regUsername" name="username" autocomplete="username"
                 minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+" required />
        </div>
        <div class="field">
          <label class="field-label" for="regEmail">Email <span class="hint">(optional)</span></label>
          <input type="email" id="regEmail" name="email" autocomplete="email" />
        </div>
        <div class="field">
          <label class="field-label" for="regPassword">Password <span class="hint">(min 8 chars)</span></label>
          <input type="password" id="regPassword" name="password" autocomplete="new-password"
                 minlength="8" required />
        </div>
        <div class="dialog-actions">
          <button type="submit" class="btn primary">Create account</button>
        </div>
      </form>
      <div class="dialog-switch hidden" id="toLoginWrap">Already registered? <a id="showLogin">Sign in</a></div>
    </div>
  </div>
</div>

<script>
(() => {
  const dlgTitle = document.getElementById('dlgTitle');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginError = document.getElementById('loginError');
  const registerError = document.getElementById('registerError');
  const toRegisterWrap = document.getElementById('toRegisterWrap');
  const toLoginWrap = document.getElementById('toLoginWrap');

  function showLogin() {
    dlgTitle.textContent = 'Sign in - Artist Helper';
    loginForm.classList.remove('hidden');
    toRegisterWrap.classList.remove('hidden');
    registerForm.classList.add('hidden');
    toLoginWrap.classList.add('hidden');
    loginError.textContent = '';
    registerError.textContent = '';
  }
  function showRegister() {
    dlgTitle.textContent = 'Create account - Artist Helper';
    registerForm.classList.remove('hidden');
    toLoginWrap.classList.remove('hidden');
    loginForm.classList.add('hidden');
    toRegisterWrap.classList.add('hidden');
    loginError.textContent = '';
    registerError.textContent = '';
  }
  document.getElementById('showRegister').addEventListener('click', showRegister);
  document.getElementById('showLogin').addEventListener('click', showLogin);

  async function submit(url, body, errEl) {
    errEl.textContent = '';
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        errEl.textContent = data.error || 'Something went wrong.';
        return;
      }
      window.location.href = '/';
    } catch {
      errEl.textContent = 'Network error. Please try again.';
    }
  }

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    submit('/api/auth/login', {
      username: document.getElementById('loginUsername').value,
      password: document.getElementById('loginPassword').value,
    }, loginError);
  });

  registerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    submit('/api/auth/register', {
      username: document.getElementById('regUsername').value,
      email: document.getElementById('regEmail').value || undefined,
      password: document.getElementById('regPassword').value,
    }, registerError);
  });

  // If already signed in, skip straight to the hub.
  fetch('/api/auth/me').then((r) => r.json()).then((d) => {
    if (d.user) window.location.href = '/';
  }).catch(() => {});
})();
</script>
</body>
</html>
